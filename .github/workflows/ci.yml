name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: edgebrain
          POSTGRES_PASSWORD: edgebrain
          POSTGRES_DB: edgebrain
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint (syntax check)
        run: |
          python -m py_compile backend/app/main.py
          python -m py_compile backend/app/agents/multi_agent.py
          python -m py_compile backend/app/ai/rules.py
          python -m py_compile backend/app/ai/anomaly.py
          python -m py_compile backend/app/ai/prediction.py
          python -m py_compile backend/app/api/routes.py

      - name: Run tests
        env:
          DATABASE_URL: postgresql://edgebrain:edgebrain@localhost:5432/edgebrain
          REDIS_URL: redis://localhost:6379/0
        run: cd backend && python -m pytest tests/ -v --tb=short

  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && startsWith(github.event.head_commit.message, 'release:')
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: echo "tag=$(echo '${{ github.event.head_commit.message }}' | grep -oP 'v[\d.]+')" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
