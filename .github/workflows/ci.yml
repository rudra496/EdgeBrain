name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: edgebrain
          POSTGRES_PASSWORD: edgebrain
          POSTGRES_DB: edgebrain
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://edgebrain:edgebrain@localhost:5432/edgebrain
          REDIS_URL: redis://localhost:6379/0
          MQTT_HOST: localhost
          MQTT_PORT: 1883
        run: |
          cd backend
          python -m pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: |
          python -m py_compile backend/app/main.py
          python -m py_compile backend/app/agents/multi_agent.py
          python -m py_compile backend/app/ai/rules.py
          python -m py_compile backend/app/ai/anomaly.py
          echo "All Python files compile successfully"
